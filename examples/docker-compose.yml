services:
  nautrouds-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - nautrouds-sockets:/var/run/nautrouds
      - ./Ntufile.example:/etc/nautrouds/Ntufile
    environment:
      - NAUTROUDS_CONFIG=/etc/nautrouds/Ntufile
    restart: always

  backend-service:
    build:
      context: ..
      dockerfile: examples/backend/Dockerfile
    environment:
      - SERVICE_NAME=backend-service
    volumes:
      - nautrouds-sockets:/var/run/nautrouds
    restart: always

  # Optional: Bridge TCP to UDS so you can test from host
  gateway:
    image: alpine/socat
    command: tcp-listen:8080,fork,reuseaddr unix-connect:/var/run/nautrouds/entrypoints/nautrouds-0.sock
    ports:
      - "8080:8080"
    volumes:
      - nautrouds-sockets:/var/run/nautrouds
    depends_on:
      - nautrouds-core

volumes:
  nautrouds-sockets:
