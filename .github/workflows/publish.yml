name: Publish Nautrouds

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & Publish Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata (Nautrouds)
        id: meta-nautrouds
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nautrouds
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - name: Build and Push Nautrouds
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-nautrouds.outputs.tags }}
          labels: ${{ steps.meta-nautrouds.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max