name: Nautrouds CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  go-tests:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install dependencies
        run: go mod download
      - name: Run Unit Tests
        run: go test -v ./internal/...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: go-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Integration Tests
        run: go test -v -timeout 300s ./tests/... -run TestIntegration

  publish-ghcr:
    name: Publish Image to GHCR
    runs-on: ubuntu-latest
    needs: [go-tests, integration-tests]
    if: >-
      github.repository == 'nautrouds/nautrouds' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata (Nautrouds)
        id: meta-nautrouds
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYMMDDHH'}}-{{sha}}

      - name: Build and Push Nautrouds
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-nautrouds.outputs.tags }}
          labels: ${{ steps.meta-nautrouds.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
